<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Recon</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="icons/icon32.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --navy:#0D1235; --azure:#2B7DE9; --accent:#1663C7; --muted:#59627F; --line:#E2E7F1; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',-apple-system,sans-serif; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background:#FDFDFC;
      background-image:linear-gradient(rgba(13,18,53,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(13,18,53,0.05) 1px,transparent 1px);
      background-size:48px 48px;
    }
    .card {
      width:380px; background:#fff; border:1px solid var(--line);
      border-radius:16px; padding:38px 34px; box-shadow:0 20px 50px rgba(13,18,53,0.08);
    }
    .logo-row { display:flex; align-items:center; gap:11px; margin-bottom:26px; }
    .logo-row img { width:38px; height:38px; border-radius:9px; }
    .logo-name { font-size:19px; font-weight:800; color:var(--navy); letter-spacing:-0.02em; }
    .logo-sub { font-size:11px; color:var(--muted); }
    h1 { font-size:15px; color:var(--navy); margin-bottom:18px; font-weight:600; }
    label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:5px; }
    input {
      width:100%; height:42px; padding:0 13px; margin-bottom:14px;
      border:1px solid var(--line); border-radius:9px; font-size:14px;
    }
    input:focus { outline:none; border-color:var(--accent); }
    .btn {
      width:100%; height:44px; border:none; border-radius:999px; font-size:14px;
      font-weight:600; cursor:pointer; margin-bottom:10px;
    }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:#1152A6; }
    .btn-google { background:#fff; border:1px solid var(--line); color:var(--navy); }
    .btn-google:hover { border-color:var(--accent); }
    .auth-message { font-size:12.5px; min-height:18px; margin-bottom:8px; }
    .auth-message.error { color:#C0320F; }
    .auth-message.success { color:#0E8A6B; }
    .foot { font-size:12px; color:var(--muted); text-align:center; margin-top:8px; }
    .foot a { color:var(--accent); cursor:pointer; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <img src="icons/icon128.png" alt="Recon" />
      <div>
        <div class="logo-name">Recon</div>
        <div class="logo-sub">by 450Digital</div>
      </div>
    </div>
    <h1>Sign in to your account</h1>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@company.com" />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <div id="auth-message" class="auth-message"></div>
    <button class="btn btn-primary" onclick="signInWithEmail()">Sign in</button>
    <button class="btn btn-google" onclick="signInWithGoogle()">Continue with Google</button>
    <div class="foot">Need access? <a onclick="showSignUp()">Request an account</a></div>
  </div>
  <script src="app.js"></script>
  <script>
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') signInWithEmail(); });
  </script>
</body>
</html>
